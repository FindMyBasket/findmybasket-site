name: secret-divergence-check

# Standing check for credential drift across stores (Vault vs edge-function
# secrets), built after 2026-07-24 when four credentials were found with copies
# out of sync in a single day. Read-only: it compares SHA-256 digests only —
# edge secrets report their digest directly, Vault values are hashed IN-DATABASE
# (pgcrypto), so no plaintext ever leaves Postgres or reaches this runner.
#
# Fails the run (red X in the Actions tab) when a cross-store pair diverges, so a
# "updated one copy, forgot the other" mistake surfaces on its own instead of
# becoming a baffling prod incident weeks later.
#
# REQUIRED repo secret (NOT the project service key — the management API needs a
# Supabase ACCOUNT access token, sbp_...):
#   SUPABASE_ACCESS_TOKEN  - https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF   - crtrjoescntlcjiwdtrt (already used by other workflows)

"on":
  schedule:
    - cron: '0 8 * * 1'   # 08:00 UTC every Monday
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run secret divergence check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN repo secret is not set — add an account access token (sbp_...) at https://supabase.com/dashboard/account/tokens"
            exit 1
          fi
          bash scripts/secret-divergence-check.sh
