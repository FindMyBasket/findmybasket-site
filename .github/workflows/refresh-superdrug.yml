name: refresh-superdrug

# Weekly refresh of Superdrug catalogue from Rakuten LinkShare SFTP feed.
#
# Pipeline:
#   1. SFTP into aftp.linksynergy.com using publisher credentials
#   2. Download Superdrug's full feed (filename: 50336_4684964_mp.xml.gz)
#   3. Decompress, filter to skincare-only, convert XML -> NDJSON
#   4. Re-gzip and upload to Supabase Storage at feeds/superdrug/latest.ndjson.gz
#   5. POST to import-rakuten-feed function to apply the import
#
# Required GitHub Secrets:
#   - RAKUTEN_SFTP_USER       - LinkShare SFTP username
#   - RAKUTEN_SFTP_PASSWORD   - LinkShare SFTP password
#   - SUPABASE_PROJECT_REF    - e.g. "crtrjoescntlcjiwdtrt"
#   - SUPABASE_SERVICE_KEY    - service role key for Storage upload + function call
#
# Schedule: every Monday at 03:00 UTC.

on:
  schedule:
    - cron: '0 3 * * 1'  # Mon 03:00 UTC
  workflow_dispatch:      # Allow manual trigger

env:
  FEED_FILENAME: 50336_4684964_mp.xml.gz

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass

      - name: Download feed via SFTP
        env:
          SFTP_USER: ${{ secrets.RAKUTEN_SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.RAKUTEN_SFTP_PASSWORD }}
        run: |
          mkdir -p feed
          # SFTP doesn't reliably expand wildcards on this server, so we use
          # the exact filename. The publisher ID (4684964) is stable per account.
          sshpass -p "$SFTP_PASSWORD" sftp -o StrictHostKeyChecking=no \
            -o BatchMode=no \
            "$SFTP_USER@aftp.linksynergy.com" <<EOF
          cd /
          get $FEED_FILENAME feed/$FEED_FILENAME
          bye
          EOF
          if [ ! -f "feed/$FEED_FILENAME" ]; then
            echo "::error::Feed file not downloaded"
            exit 1
          fi
          ls -lah feed/
          echo "FEED_FILE=feed/$FEED_FILENAME" >> $GITHUB_ENV

      - name: Decompress, filter to skincare, convert to NDJSON
        run: |
          gunzip -k "$FEED_FILE"
          XML_FILE="${FEED_FILE%.gz}"
          ls -lah "$XML_FILE"
          export XML_FILE

          python3 <<'PYEOF'
          import xml.etree.ElementTree as ET
          import json
          import os

          xml_file = os.environ["XML_FILE"]
          count = 0
          skipped_no_url = 0
          inspected = 0
          sample_categories = set()

          with open("superdrug_skincare.ndjson", "w", encoding="utf-8") as f_out:
              context = ET.iterparse(xml_file, events=("end",))
              for event, p in context:
                  if p.tag != "product":
                      continue
                  inspected += 1

                  category = p.find("category")
                  secondary = category.findtext("secondary", "") if category is not None else ""

                  if inspected <= 50 and secondary:
                      sample_categories.add(secondary[:80])

                  if "Skincare" not in secondary:
                      p.clear()
                      continue

                  attrs = p.attrib
                  primary = category.findtext("primary", "") if category is not None else ""
                  price_elem = p.find("price/retail")
                  price_text = price_elem.text if price_elem is not None else ""
                  url_elem = p.find("URL/product")
                  url = url_elem.text if url_elem is not None and url_elem.text else ""
                  avail_elem = p.find("shipping/availability")
                  availability = avail_elem.text if avail_elem is not None else ""
                  brand = p.findtext("brand", "") or attrs.get("manufacturer_name", "")

                  if not url:
                      skipped_no_url += 1
                      p.clear()
                      continue

                  try:
                      price = float(price_text) if price_text else 0
                  except ValueError:
                      price = 0

                  record = {
                      "name": attrs.get("name", ""),
                      "sku": attrs.get("sku_number", ""),
                      "product_id": attrs.get("product_id", ""),
                      "brand": brand,
                      "category_primary": primary,
                      "category_secondary": secondary,
                      "price": price,
                      "availability": availability,
                      "url": url,
                  }
                  f_out.write(json.dumps(record, ensure_ascii=False) + "\n")
                  count += 1
                  p.clear()

          print(f"Inspected {inspected} products total")
          print(f"Wrote {count} skincare records (skipped {skipped_no_url} with no URL)")
          print(f"Sample category strings from first 50 products:")
          for c in list(sample_categories)[:10]:
              print(f"  - {c}")
          if count < 50:
              raise SystemExit(f"ERROR: Fewer than 50 skincare records ({count}) - likely a filter/format mismatch")
          PYEOF

          ls -lah superdrug_skincare.ndjson
          gzip -9 superdrug_skincare.ndjson
          ls -lah superdrug_skincare.ndjson.gz

      - name: Upload filtered feed to Supabase Storage
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -fsSL -X POST \
            "https://${PROJECT_REF}.supabase.co/storage/v1/object/rakuten-feeds/feeds/superdrug/latest.ndjson.gz" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "Content-Type: application/gzip" \
            -H "x-upsert: true" \
            --data-binary "@superdrug_skincare.ndjson.gz" \
            -w "Storage upload HTTP %{http_code}\n"

      - name: Trigger import-rakuten-feed
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          RESPONSE=$(curl -fsSL -X POST \
            "https://${PROJECT_REF}.supabase.co/functions/v1/import-rakuten-feed" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            --max-time 300 \
            -d '{"retailer_id": 12, "feed_path": "feeds/superdrug/latest.ndjson.gz", "dry_run": false}')
          echo "$RESPONSE" | head -c 4000
          echo ""
          echo "$RESPONSE" | grep -q '"applied"' || {
            echo "::error::Import function did not return success"
            exit 1
          }
