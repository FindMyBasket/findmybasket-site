name: refresh-superdrug

# Weekly refresh of Superdrug catalogue from Rakuten LinkShare SFTP feed.
#
# v6 update: removed skincare-only filter. The cmp feed now passes ALL beauty
# products (skincare/makeup/hair/etc.) to import-rakuten-feed which has v6
# inference and category filtering via retailer_import_config.
#
# The cmp feed lives in /50336/ split across multiple category files.
# Each <product> contains <URL><product>...</product></URL> - i.e. nested
# <product> tags. Our iterparse loop must use depth-aware processing so we
# only act on top-level products, otherwise inner <URL><product> tags get
# mistaken for products and the .clear() call wipes URLs before extraction.

"on":
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass

      - name: Download cmp feeds via SFTP
        env:
          SFTP_USER: ${{ secrets.RAKUTEN_SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.RAKUTEN_SFTP_PASSWORD }}
        run: |
          mkdir -p feed
          sshpass -p "$SFTP_PASSWORD" sftp -o StrictHostKeyChecking=no \
            -o BatchMode=no \
            "$SFTP_USER@aftp.linksynergy.com" <<'EOF'
          cd /50336
          mget *_cmp.xml.gz
          bye
          EOF

          mv *_cmp.xml.gz feed/ 2>/dev/null || true
          rm -f feed/*template* feed/*delta* 2>/dev/null || true

          ls -lah feed/
          COUNT=$(ls feed/*.gz 2>/dev/null | wc -l)
          if [ "$COUNT" -lt 1 ]; then
            echo "::error::No cmp feed files downloaded"
            exit 1
          fi
          echo "Downloaded $COUNT feed files"

      - name: Decompress and convert to NDJSON
        run: |
          for f in feed/*.gz; do
            gunzip -k "$f"
          done
          ls -lah feed/

          python3 <<'PYEOF'
          import xml.etree.ElementTree as ET
          import json
          import glob
          import os

          xml_files = sorted(glob.glob("feed/*.xml"))
          print(f"Processing {len(xml_files)} XML files")

          count = 0
          skipped_no_url = 0
          inspected = 0
          with_upc = 0
          with_mpn = 0

          # v6 update: coarse beauty pre-filter to keep feed size manageable.
          # The Rakuten cmp feed without filtering is 40K+ rows. Combined
          # with the edge function's 40K+ product cross-retailer index load,
          # we exceed the 400ms CPU limit. This pre-filter cuts the feed to
          # roughly 20-25K beauty rows. Fine-grained skincare/makeup/hair
          # split still happens in import-rakuten-feed.
          BEAUTY_KEYWORDS = ("Skincare", "Cosmetics", "Hair Care", "Bath & Body", "Make-up", "Makeup", "Nail")

          with open("superdrug_all.ndjson", "w", encoding="utf-8") as f_out:
              for xml_file in xml_files:
                  file_count_before = count
                  file_inspected_before = inspected

                  context = ET.iterparse(xml_file, events=("start", "end"))
                  depth = 0
                  for event, elem in context:
                      if elem.tag != "product":
                          continue
                      if event == "start":
                          depth += 1
                          continue
                      if depth != 1:
                          depth -= 1
                          continue

                      p = elem
                      inspected += 1

                      category = p.find("category")
                      secondary = category.findtext("secondary", "") if category is not None else ""
                      primary = category.findtext("primary", "") if category is not None else ""

                      # Coarse beauty pre-filter (v6 update)
                      if not any(kw in secondary for kw in BEAUTY_KEYWORDS):
                          p.clear()
                          depth -= 1
                          continue

                      attrs = p.attrib
                      price_elem = p.find("price/retail")
                      price_text = price_elem.text if price_elem is not None else ""
                      url_elem = p.find("URL/product")
                      url = url_elem.text if url_elem is not None and url_elem.text else ""
                      avail_elem = p.find("shipping/availability")
                      availability = avail_elem.text if avail_elem is not None else ""
                      brand = p.findtext("brand", "") or attrs.get("manufacturer_name", "")

                      upc = (p.findtext("upc", "") or "").strip()
                      mpn = (p.findtext("mpn", "") or "").strip()

                      if not url:
                          skipped_no_url += 1
                          p.clear()
                          depth -= 1
                          continue

                      try:
                          price = float(price_text) if price_text else 0
                      except ValueError:
                          price = 0

                      if upc:
                          with_upc += 1
                      if mpn:
                          with_mpn += 1

                      record = {
                          "name": attrs.get("name", ""),
                          "sku": attrs.get("sku_number", ""),
                          "product_id": attrs.get("product_id", ""),
                          "brand": brand,
                          "category_primary": primary,
                          "category_secondary": secondary,
                          "price": price,
                          "availability": availability,
                          "url": url,
                          "upc": upc,
                          "mpn": mpn,
                      }
                      f_out.write(json.dumps(record, ensure_ascii=False) + "\n")
                      count += 1
                      p.clear()
                      depth -= 1

                  print(f"  {os.path.basename(xml_file)}: inspected {inspected - file_inspected_before}, wrote {count - file_count_before}")

          print(f"\nTotal inspected: {inspected}")
          print(f"Total wrote: {count} records (skipped {skipped_no_url} with no URL)")
          print(f"With UPC: {with_upc} ({100.0 * with_upc / max(count, 1):.1f}%)")
          print(f"With MPN: {with_mpn} ({100.0 * with_mpn / max(count, 1):.1f}%)")
          if count < 50:
              raise SystemExit(f"ERROR: Fewer than 50 records ({count})")
          PYEOF

          ls -lah superdrug_all.ndjson
          gzip -9 superdrug_all.ndjson
          ls -lah superdrug_all.ndjson.gz

      - name: Upload feed to Supabase Storage
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -fsSL -X POST \
            "https://${PROJECT_REF}.supabase.co/storage/v1/object/rakuten-feeds/feeds/superdrug/latest.ndjson.gz" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "Content-Type: application/gzip" \
            -H "x-upsert: true" \
            --data-binary "@superdrug_all.ndjson.gz" \
            -w "Storage upload HTTP %{http_code}\n"

      - name: Trigger import-rakuten-feed
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          RESPONSE=$(curl -fsSL -X POST \
            "https://${PROJECT_REF}.supabase.co/functions/v1/import-rakuten-feed" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            --max-time 300 \
            -d '{"retailer_id": 12, "feed_path": "feeds/superdrug/latest.ndjson.gz", "dry_run": true}')
          echo "$RESPONSE" | head -c 4000
          echo ""
          echo "$RESPONSE" | grep -q '"applied"' || {
            echo "::error::Import function did not return success"
            exit 1
          }
