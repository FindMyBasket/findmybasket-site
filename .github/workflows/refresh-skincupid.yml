name: refresh-skincupid

# Weekly refresh of Skin Cupid catalogue from Shopify /products.json endpoint.
#
# Skin Cupid runs on Shopify, which exposes a public read-only JSON API at
# /products.json. We paginate through it, transform to NDJSON, upload to
# Supabase Storage, and trigger import-shopify-feed for v6 inference + DB write.
#
# Pagination: /products.json?limit=250&page=N walks the catalogue. Empty
# response means we're past the end.
#
# Pattern matches refresh-bb (AWIN Darwin) and refresh-superdrug (Rakuten):
# GitHub Action does data acquisition, edge function does data processing.

"on":
  schedule:
    - cron: '0 4 * * 0'  # Weekly Sunday 04:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no DB writes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Fetch Shopify products and convert to NDJSON
        run: |
          python3 <<'PYEOF'
          import urllib.request
          import urllib.error
          import json
          import gzip
          import time

          STOREFRONT = "https://www.skincupid.co.uk"
          AWIN_MID = "125042"      # Skin Cupid AWIN advertiser ID
          AWIN_AFFID = "2841268"   # Your AWIN publisher ID
          PAGE_LIMIT = 250
          MAX_PAGES = 50  # Hard cap. 250 * 50 = 12500 product ceiling.

          import urllib.parse

          def build_affiliate_url(handle):
              if not handle:
                  return ""
              merchant_url = f"{STOREFRONT}/products/{handle}"
              encoded = urllib.parse.quote(merchant_url, safe='')
              return f"https://www.awin1.com/cread.php?awinmid={AWIN_MID}&awinaffid={AWIN_AFFID}&ued={encoded}"

          def fetch_page(page):
              url = f"{STOREFRONT}/products.json?limit={PAGE_LIMIT}&page={page}"
              req = urllib.request.Request(url, headers={
                  "User-Agent": "FindMyBasket/1.0 (price comparison)",
                  "Accept": "application/json",
              })
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.load(resp)

          total_products = 0
          total_variants = 0
          page = 1
          with open("skincupid.ndjson", "w", encoding="utf-8") as f_out:
              while page <= MAX_PAGES:
                  try:
                      data = fetch_page(page)
                  except urllib.error.HTTPError as e:
                      print(f"::error::HTTP {e.code} on page {page}: {e.reason}")
                      raise SystemExit(1)
                  except Exception as e:
                      print(f"::error::Failed page {page}: {e}")
                      raise SystemExit(1)

                  products = data.get("products", [])
                  if not products:
                      print(f"Page {page}: empty, end of pagination")
                      break

                  for p in products:
                      total_products += 1
                      title = p.get("title") or ""
                      vendor = p.get("vendor") or ""
                      product_type = p.get("product_type") or ""
                      handle = p.get("handle") or ""
                      tags = p.get("tags") or []
                      if isinstance(tags, str):
                          tags = [t.strip() for t in tags.split(",") if t.strip()]
                      variants = p.get("variants") or []

                      # Each variant becomes a separate NDJSON row, since variants
                      # have different SKUs/prices/availability. The product-level
                      # name gets the variant title appended if it differs from
                      # "Default Title" (single-variant products use that as a
                      # placeholder).
                      for v in variants:
                          variant_title = (v.get("title") or "").strip()
                          variant_sku = (v.get("sku") or "").strip()
                          if not variant_sku:
                              # Skip variants with no SKU - we need a stable
                              # external_product_id for matching.
                              continue
                          # Build display name. Append variant title only if
                          # meaningful (not the Shopify default placeholder).
                          if variant_title and variant_title.lower() != "default title":
                              display_name = f"{title} - {variant_title}"
                          else:
                              display_name = title

                          record = {
                              "title": display_name,
                              "vendor": vendor,
                              "product_type": product_type,
                              "handle": handle,
                              "tags": tags,
                              "sku": variant_sku,
                              "price": v.get("price") or "0",
                              "available": bool(v.get("available")),
                              "url": build_affiliate_url(handle),
                          }
                          f_out.write(json.dumps(record, ensure_ascii=False) + "\n")
                          total_variants += 1

                  print(f"Page {page}: {len(products)} products processed")
                  page += 1
                  time.sleep(0.5)  # Polite pacing
              else:
                  print(f"::warning::Hit MAX_PAGES ({MAX_PAGES}) limit. Catalogue may be larger than expected.")

          print(f"\nTotal: {total_products} products, {total_variants} variants written")
          if total_variants < 50:
              raise SystemExit(f"ERROR: Fewer than 50 variants ({total_variants})")
          PYEOF

          ls -lah skincupid.ndjson
          gzip -9 skincupid.ndjson
          ls -lah skincupid.ndjson.gz

      - name: Upload feed to Supabase Storage
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -fsSL -X POST \
            "https://${PROJECT_REF}.supabase.co/storage/v1/object/shopify-feeds/feeds/skincupid/latest.ndjson.gz" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "Content-Type: application/gzip" \
            -H "x-upsert: true" \
            --data-binary "@skincupid.ndjson.gz" \
            -w "Storage upload HTTP %{http_code}\n"

      - name: Trigger import-shopify-feed
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          RESPONSE=$(curl -fsSL -X POST \
            "https://${PROJECT_REF}.supabase.co/functions/v1/import-shopify-feed" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            --max-time 300 \
            -d "{\"retailer_id\": 7, \"feed_path\": \"feeds/skincupid/latest.ndjson.gz\", \"dry_run\": ${DRY_RUN}}")
          echo "$RESPONSE" | head -c 6000
          echo ""
          if [ "$DRY_RUN" = "true" ]; then
            # In dry-run mode, success means we got a counts block back
            echo "$RESPONSE" | grep -q '"counts"' || {
              echo "::error::Import function did not return success"
              exit 1
            }
          else
            # In apply mode, success means we got an applied block back
            echo "$RESPONSE" | grep -q '"applied"' || {
              echo "::error::Import function did not return success"
              exit 1
            }
          fi
